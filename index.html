<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TODO лист</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #fafafa;
      color: #333;
      line-height: 1.6;
      padding: 32px 16px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-weight: 500;
      font-size: 28px;
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 16px;
      outline: none;
      max-width: calc(100% - 100px);
    }

    input[type="text"]:focus {
      border-color: #999;
    }

    button {
      padding: 12px 16px;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #555;
    }
    
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .select-all {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tabs {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid #eee;
      padding-bottom: 8px;
    }

    .tab {
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 4px;
      background: #f0f0f0;
    }

    .tab.active {
      background: #333;
      color: white;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      padding: 12px;
      background: white;
      border: 1px solid #eee;
      border-radius: 4px;
      margin-bottom: 8px;
      word-break: break-word;
    }

    li input[type="checkbox"] {
      margin-right: 12px;
      transform: scale(1.2);
    }

    .task-text {
      flex: 1;
      padding-right: 12px;
      cursor: pointer;
      min-height: 20px;
    }

    .task-actions {
      display: flex;
      gap: 8px;
    }

    .btn-delete {
      background-color: #f44336;
      padding: 6px 10px;
      font-size: 14px;
    }

    .btn-delete:hover {
      background-color: #d32f2f;
    }

    .clear-completed {
      width: 100%;
      margin-top: 16px;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
    }

    .pagination button {
      padding: 6px 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Мой TODO-лист</h1>

    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Введите задачу (до 250 символов)..." maxlength="250" />
      <button id="addBtn">Добавить</button>
    </div>

    <div class="controls">
      <div class="select-all">
        <input type="checkbox" id="selectAllCheckbox" />
        <label for="selectAllCheckbox">Выбрать все</label>
      </div>
      <button id="clearCompletedBtn" class="clear-completed" style="width: auto; padding: 6px 12px; font-size: 14px;">
        Удалить выполненные
      </button>
    </div>

    <div class="tabs">
      <div class="tab active" data-filter="all">Все (<span id="count-all">0</span>)</div>
      <div class="tab" data-filter="active">Активные (<span id="count-active">0</span>)</div>
      <div class="tab" data-filter="completed">Завершённые (<span id="count-completed">0</span>)</div>
    </div>

    <ul id="taskList"></ul>

    <div class="pagination" id="pagination"></div>
  </div>
  
  <script>
    const API_URL = "http://localhost:3000/tasks";

    const taskInput = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const taskList = document.getElementById('taskList');
    const selectAllCheckbox = document.getElementById('selectAllCheckbox');
    const clearCompletedBtn = document.getElementById('clearCompletedBtn');
    const tabs = document.querySelectorAll('.tab');
    const paginationEl = document.getElementById('pagination');

    let tasks = [];
    let currentFilter = 'all';
    const TASKS_PER_PAGE = 5;
    let currentPage = 1;

    async function loadTasks() {
      try {
        const response = await fetch(`${API_URL}`);
        tasks = await response.json();
        printTasks();
      } catch (err) {
        console.error("Ошибка загрузки задач:", err);
      }
    }

    function syncSelectAllCheckbox() {
      const filteredTasks = getFilteredTasks();
      
      if (filteredTasks.length === 0) {
        selectAllCheckbox.checked = false;
        return;
      }
      
      const allCompleted = filteredTasks.every(task => task.completed);
      selectAllCheckbox.checked = allCompleted;
    }

    function updateCounts() {
      const allCount = tasks.length;
      const activeCount = tasks.filter(t => !t.completed).length;
      const completedCount = tasks.filter(t => t.completed).length;

      document.getElementById('count-all').textContent = allCount;
      document.getElementById('count-active').textContent = activeCount;
      document.getElementById('count-completed').textContent = completedCount;
    }

    function getFilteredTasks() {
      if (currentFilter === 'active') return tasks.filter(t => !t.completed);
      if (currentFilter === 'completed') return tasks.filter(t => t.completed);
      return [...tasks];
    }

    function renderPagination(totalItems) {
      paginationEl.innerHTML = '';
      
      const totalPages = Math.ceil(totalItems / TASKS_PER_PAGE);
      
      if (totalPages <= 1) {
        return;
      }

      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.style.backgroundColor = i === currentPage ? '#333' : '#f0f0f0';
        btn.style.border = 'none';
        btn.style.padding = '6px 12px';
        btn.style.margin = '0 4px';
        btn.style.borderRadius = '4px';
        btn.style.cursor = 'pointer';
        
        btn.onclick = () => {
          currentPage = i;
          printTasks();
        };
        
        paginationEl.appendChild(btn);
      }
    }

    function printTasks() {
      const filtered = getFilteredTasks();
      const start = (currentPage - 1) * TASKS_PER_PAGE;
      const paginated = filtered.slice(start, start + TASKS_PER_PAGE);

      taskList.innerHTML = '';
      paginated.forEach((task) => {
        const li = document.createElement('li');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = task.completed;
        checkbox.onchange = async () => {
          try {
            await fetch(`${API_URL}/${task.id}`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ completed: checkbox.checked })
            });
            await loadTasks();
          } catch (err) {
            console.error("Ошибка обновления:", err);
          }
        };

        const taskText = document.createElement('span');
        taskText.className = 'task-text';
        taskText.textContent = task.text;
        
        if (task.completed) {
          taskText.style.textDecoration = 'line-through';
          taskText.style.color = '#888';
        }

        taskText.contentEditable = false;
        taskText.onclick = () => {
          const originalText = task.text;
          taskText.contentEditable = true;
          taskText.focus();
          const range = document.createRange();
          range.selectNodeContents(taskText);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);

          const saveEdit = async () => {
            const newText = taskText.textContent.trim();
            if (newText === '' || newText === originalText) {
              taskText.textContent = originalText;
            } else {
              try {
                await fetch(`${API_URL}/${task.id}`, {
                  method: "PATCH",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ text: newText })
                });
              } catch (err) {
                console.error("Ошибка обновления текста:", err);
                taskText.textContent = originalText;
              }
            }
            taskText.contentEditable = false;
            document.removeEventListener('keydown', onKeyDown);
            taskText.removeEventListener('blur', saveEdit);
          };

          const onKeyDown = (e) => {
            if (e.key === 'Escape') {
              taskText.textContent = originalText;
              taskText.contentEditable = false;
              document.removeEventListener('keydown', onKeyDown);
              taskText.removeEventListener('blur', saveEdit);
            } else if (e.key === 'Enter') {
              e.preventDefault();
              saveEdit();
            }
          };
          
          document.addEventListener('keydown', onKeyDown);
          taskText.addEventListener('blur', saveEdit);
        };

        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'Удалить';
        deleteBtn.className = 'btn-delete';
        deleteBtn.onclick = async () => {
          try {
            await fetch(`${API_URL}/${task.id}`, { method: "DELETE" });
            await loadTasks();
          } catch (err) {
            console.error("Ошибка удаления:", err);
          }
        };

        const actions = document.createElement('div');
        actions.className = 'task-actions';
        actions.appendChild(deleteBtn);

        li.appendChild(checkbox);
        li.appendChild(taskText);
        li.appendChild(actions);
        taskList.appendChild(li);
      });

      syncSelectAllCheckbox();
      updateCounts();
      renderPagination(filtered.length);
    }

    async function addTask() {
      const text = taskInput.value.trim();
      if (text === '') return;
      
      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: text, completed: false })
        });
        
        const result = await response.json();
        
        if (result.id || result.status === "ok") {
          taskInput.value = '';
          taskInput.focus();
          currentPage = 1;
          await loadTasks();
        }
      } catch (err) {
        console.error("Ошибка добавления:", err);
      }
    }

    addBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addTask();
    });

    taskInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        taskInput.value = '';
        taskInput.blur();
      }
    });

    selectAllCheckbox.addEventListener('change', async () => {
      const checked = selectAllCheckbox.checked;
      const filteredTasks = getFilteredTasks();
      
      try {
        for (const task of filteredTasks) {
          await fetch(`${API_URL}/${task.id}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ completed: checked })
          });
        }
        await loadTasks();
      } catch (err) {
        console.error("Ошибка массового обновления:", err);
      }
    });

    clearCompletedBtn.addEventListener('click', async () => {
      try {
        await fetch(`${API_URL}/completed`, { method: "DELETE" });
        await loadTasks();
      } catch (err) {
        console.error("Ошибка очистки:", err);
      }
    });

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        currentPage = 1;
        loadTasks();
      });
    });

    loadTasks();
  </script>
</body>
</html>
